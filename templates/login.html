<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Hospital Management System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo .icon {
      font-size: 2.5rem;
    }

    .logo h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a202c;
      margin-top: 0.5rem;
    }

    .logo p {
      font-size: 0.85rem;
      color: #718096;
      margin-top: 0.2rem;
    }

    .flash-messages { margin-bottom: 1rem; }

    .flash {
      padding: 0.65rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }

    .flash.error   { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    .flash.success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }

    .form-group { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #4a5568;
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.95rem;
      color: #2d3748;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.15); }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input { padding-right: 2.5rem; }

    .toggle-pw {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #a0aec0;
      font-size: 1rem;
      padding: 0;
      line-height: 1;
    }

    .toggle-pw:hover { color: #4a5568; }

    .btn-login {
      width: 100%;
      padding: 0.7rem;
      background: #3182ce;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    .btn-login:hover { background: #2b6cb0; }

    .footer-note {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.8rem;
      color: #a0aec0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="icon">🏥</div>
      <h1>Hospital Management</h1>
      <p>Admin Portal — Please sign in</p>
    </div>

    {% if get_flashed_messages() %}
    <div class="flash-messages">
      {% for category, message in get_flashed_messages(with_categories=true) %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login_view') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your username"
          value="{{ request.form.get('username', '') }}"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-pw" onclick="togglePw()" title="Show/hide password">
            👁
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <p class="footer-note">Default: admin / Admin@123 &nbsp;|&nbsp; Change after first login</p>
  </div>

  <script>
    function togglePw() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
