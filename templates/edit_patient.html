{% extends "base.html" %}
{% block title %}Edit Patient{% endblock %}
{% block page_title %}Edit Patient #{{ patient.get_patient_id() }}{% endblock %}

{% block content %}
<div class="card" style="max-width:620px;">
  <div class="card-title">Update Patient Details</div>
  <form method="post" action="{{ url_for('edit_patient', pid=patient.get_patient_id()) }}">
    <div class="form-grid">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input class="form-control" id="name" name="name"
               value="{{ patient.get_name() }}" required/>
      </div>
      <div class="form-group">
        <label for="age">Age</label>
        <input class="form-control" id="age" name="age" type="number"
               min="0" max="120" value="{{ patient.get_age() }}" required/>
      </div>
      <div class="form-group">
        <label for="gender">Gender</label>
        <select class="form-control" id="gender" name="gender" required>
          <option {% if patient.get_gender()=='Male'   %}selected{% endif %}>Male</option>
          <option {% if patient.get_gender()=='Female' %}selected{% endif %}>Female</option>
          <option {% if patient.get_gender()=='Other'  %}selected{% endif %}>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="contact">Contact</label>
        <input class="form-control" id="contact" name="contact"
               value="{{ patient.get_contact() }}" pattern="\d{10}" maxlength="10" required/>
      </div>
    </div>
    <div class="form-group">
      <label for="disease">Disease / Condition</label>
      <input class="form-control" id="disease" name="disease"
             value="{{ patient.get_disease() }}" required/>
    </div>
    <div style="display:flex; gap:10px; margin-top:8px;">
      <button class="btn btn-primary" type="submit">💾 Update Patient</button>
      <a class="btn btn-edit" href="{{ url_for('patients') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
