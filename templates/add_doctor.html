{% extends "base.html" %}
{% block title %}Add Doctor{% endblock %}
{% block page_title %}Add Doctor{% endblock %}

{% block content %}
<div class="card" style="max-width:620px;">
  <div class="card-title">New Doctor Details</div>
  <form method="post" action="{{ url_for('add_doctor') }}">
    <div class="form-grid">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input class="form-control" id="name" name="name"
               placeholder="e.g. Anjali Mehta" required/>
      </div>
      <div class="form-group">
        <label for="age">Age</label>
        <input class="form-control" id="age" name="age"
               type="number" min="20" max="80" placeholder="e.g. 42" required/>
      </div>
      <div class="form-group">
        <label for="specialization">Specialization</label>
        <input class="form-control" id="specialization" name="specialization"
               placeholder="e.g. Cardiology" required/>
      </div>
      <div class="form-group">
        <label for="experience">Experience (years)</label>
        <input class="form-control" id="experience" name="experience"
               type="number" min="0" max="60" placeholder="e.g. 10" required/>
      </div>
    </div>
    <div style="display:flex; gap:10px; margin-top:8px;">
      <button class="btn btn-primary" type="submit">✅ Save Doctor</button>
      <a class="btn btn-edit" href="{{ url_for('doctors') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
