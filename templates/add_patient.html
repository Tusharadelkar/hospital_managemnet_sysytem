{% extends "base.html" %}
{% block title %}Add Patient{% endblock %}
{% block page_title %}Add Patient{% endblock %}

{% block content %}
<div class="card" style="max-width:620px;">
  <div class="card-title">New Patient Details</div>
  <form method="post" action="{{ url_for('add_patient') }}">
    <div class="form-grid">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input class="form-control" id="name" name="name"
               placeholder="e.g. Rahul Sharma" required/>
      </div>
      <div class="form-group">
        <label for="age">Age</label>
        <input class="form-control" id="age" name="age"
               type="number" min="0" max="120" placeholder="e.g. 35" required/>
      </div>
      <div class="form-group">
        <label for="gender">Gender</label>
        <select class="form-control" id="gender" name="gender" required>
          <option value="">-- Select --</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="contact">Contact (10 digits)</label>
        <input class="form-control" id="contact" name="contact"
               placeholder="e.g. 9876543210"
               pattern="\d{10}" maxlength="10" required/>
      </div>
    </div>
    <div class="form-group">
      <label for="disease">Disease / Condition</label>
      <input class="form-control" id="disease" name="disease"
             placeholder="e.g. Diabetes" required/>
    </div>
    <div style="display:flex; gap:10px; margin-top:8px;">
      <button class="btn btn-primary" type="submit">✅ Save Patient</button>
      <a class="btn btn-edit" href="{{ url_for('patients') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
