<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change Password — Hospital Management System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    h2 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #1a202c;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .flash-messages { margin-bottom: 1rem; }

    .flash {
      padding: 0.65rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }

    .flash.error   { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    .flash.success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }

    .form-group { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #4a5568;
      margin-bottom: 0.4rem;
    }

    .password-wrapper { position: relative; }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 0.6rem 2.5rem 0.6rem 0.85rem;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.95rem;
      color: #2d3748;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.15); }

    .toggle-pw {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #a0aec0;
      font-size: 1rem;
      padding: 0;
    }

    .toggle-pw:hover { color: #4a5568; }

    .hint {
      font-size: 0.78rem;
      color: #a0aec0;
      margin-top: 0.3rem;
    }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .btn {
      flex: 1;
      padding: 0.65rem;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-primary { background: #3182ce; color: #fff; }
    .btn-primary:hover { background: #2b6cb0; }

    .btn-secondary { background: #edf2f7; color: #4a5568; }
    .btn-secondary:hover { background: #e2e8f0; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔒 Change Password</h2>

    {% if get_flashed_messages() %}
    <div class="flash-messages">
      {% for category, message in get_flashed_messages(with_categories=true) %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('change_password') }}">

      <div class="form-group">
        <label for="old_password">Current Password</label>
        <div class="password-wrapper">
          <input type="password" id="old_password" name="old_password" required placeholder="Enter current password"/>
          <button type="button" class="toggle-pw" onclick="toggleField('old_password')">👁</button>
        </div>
      </div>

      <div class="form-group">
        <label for="new_password">New Password</label>
        <div class="password-wrapper">
          <input type="password" id="new_password" name="new_password" required placeholder="Enter new password"/>
          <button type="button" class="toggle-pw" onclick="toggleField('new_password')">👁</button>
        </div>
        <p class="hint">Min 8 chars · 1 uppercase · 1 digit · 1 special character</p>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirm_password" name="confirm_password" required placeholder="Re-enter new password"/>
          <button type="button" class="toggle-pw" onclick="toggleField('confirm_password')">👁</button>
        </div>
      </div>

      <div class="btn-row">
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Update Password</button>
      </div>
    </form>
  </div>

  <script>
    function toggleField(id) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
